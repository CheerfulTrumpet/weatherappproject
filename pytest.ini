[pytest]
# Pytest Configuration for Cognitive Weather Oracle
# 
# This file customizes pytest behavior for the test suite.
# Run: pytest (uses this configuration automatically)

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add current directory to path
pythonpath = .

# Test output options
addopts = 
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Show slowest 10 tests
    --durations=10
    # Coverage options (if pytest-cov installed)
    --cov=src
    --cov=main
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    # Disable warnings unless specified
    --disable-warnings
    # Show which tests are marked with which markers
    --markers

# Test markers (custom test categories)
markers =
    unit: Unit tests (test individual functions/classes)
    integration: Integration tests (test multiple components together)
    slow: Slow running tests (>1 second)
    smoke: Smoke tests (basic sanity checks)

# Timeout for tests (seconds)
# Prevents hanging tests
timeout = 300

# Logging configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Doctest options
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Test discovery
testpaths = tests

# Coverage options (for pytest-cov)
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
